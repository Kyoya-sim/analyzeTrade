<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRO TRADE ANALYZER</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.chart-container{height:260px;}
</style>
</head>

<body class="bg-slate-50 text-slate-900">

<div class="max-w-7xl mx-auto p-6">

<h1 class="text-3xl font-black mb-6">PRO TRADE ANALYZER</h1>

<div class="flex gap-4 mb-4 flex-wrap">
<input type="file" id="file">
<select id="pairFilter" class="border p-2 rounded"></select>

<input type="date" id="startDate" class="border p-2 rounded">
<input type="date" id="endDate" class="border p-2 rounded">

<button onclick="update()" class="bg-blue-500 text-white px-3 rounded">適用</button>
</div>

<!-- KPI -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 my-6">

<div class="bg-white p-4">期待値<div id="expectancy"></div></div>
<div class="bg-white p-4">勝率<div id="winRate"></div></div>
<div class="bg-white p-4">リスクリワード比<div id="rr"></div></div>
<div class="bg-white p-4">プロフィットファクター<div id="pf"></div></div>

<div class="bg-white p-4">最大ドローダウン<div id="maxDD"></div></div>
<div class="bg-white p-4">最大連敗数<div id="maxLose"></div></div>
<div class="bg-white p-4">標準偏差<div id="stdDev"></div></div>
<div class="bg-white p-4">ドローダウン期間<div id="ddDuration"></div></div>

</div>

<!-- charts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<canvas id="equity"></canvas>
<canvas id="timeExp"></canvas>
<canvas id="dayExp"></canvas>
<canvas id="rHist"></canvas>
<canvas id="rWin"></canvas>
<canvas id="loseSim"></canvas>

</div>

<h2 class="text-xl font-bold mt-10">時間帯 × 通貨ペア</h2>
<div id="heatmap" class="overflow-auto text-xs bg-white p-2"></div>

<h2 class="text-xl font-bold mt-10">トレード履歴</h2>
<div class="overflow-auto h-64 bg-white">
<table id="table" class="text-xs"></table>
</div>

</div>

<script>

let rawData=[];

document.getElementById('file').onchange=e=>{
Papa.parse(e.target.files[0],{
header:true,dynamicTyping:true,
complete:r=>{
rawData=r.data;
setupFilter();
update();
}});
};

function setupFilter(){
const pairs=[...new Set(rawData.map(d=>d['銘柄']).filter(Boolean))];
pairFilter.innerHTML='<option value="ALL">すべて</option>';
pairs.forEach(p=>pairFilter.innerHTML+=`<option>${p}</option>`);
}

function update(){

const pair=pairFilter.value;

const start=document.getElementById('startDate').value;
const end=document.getElementById('endDate').value;

let data=rawData.filter(d=>{
if(pair!=='ALL' && d['銘柄']!==pair) return false;
if(start && d['決済日時_日本']<start) return false;
if(end && d['決済日時_日本']>end) return false;
return true;
});

if(!data.length) return;

data.sort((a,b)=>new Date(a['決済日時_日本'])-new Date(b['決済日時_日本']));

// ===== 基本 =====
const wins=data.filter(d=>d['勝敗']==='Win');
const losses=data.filter(d=>d['勝敗']==='Loss');

const winRate=wins.length/data.length;

const avgWin=wins.reduce((a,b)=>a+(b['損益_pips']||0),0)/wins.length||0;
const avgLoss=Math.abs(losses.reduce((a,b)=>a+(b['損益_pips']||0),0)/losses.length)||1;

const rr=avgWin/avgLoss;

const expectancy=winRate*avgWin-(1-winRate)*avgLoss;

const totalProfit=wins.reduce((a,b)=>a+(b['損益_純額']||0),0);
const totalLoss=Math.abs(losses.reduce((a,b)=>a+(b['損益_純額']||0),0))||1;

const pf=totalProfit/totalLoss;

// ===== DD =====
let equity=0,peak=0,maxDD=0,ddDur=0,cur=0;
let curve=[];
data.forEach(d=>{
equity+=d['損益_pips']||0;
peak=Math.max(peak,equity);
if(equity<peak){cur++;ddDur=Math.max(ddDur,cur);}else cur=0;
maxDD=Math.max(maxDD,peak-equity);
curve.push(equity);
});

// ===== 連敗 =====
let lose=0,maxLose=0;
data.forEach(d=>{
if(d['勝敗']==='Loss'){lose++;maxLose=Math.max(maxLose,lose);}else lose=0;
});

// ===== 標準偏差 =====
const mean=data.reduce((a,b)=>a+(b['損益_pips']||0),0)/data.length;
const stdDev=Math.sqrt(data.reduce((a,b)=>a+Math.pow((b['損益_pips']||0)-mean,2),0)/data.length);

// ===== R倍数 =====
const rValues=data.filter(d=>d['初期SL_pips']).map(d=>d['損益_pips']/d['初期SL_pips']);

// ヒストグラム
let bins={},rWinBins={};

data.forEach(d=>{
if(!d['初期SL_pips']) return;
const r=d['損益_pips']/d['初期SL_pips'];
const key=Math.floor(r);

if(!bins[key]) bins[key]=0;
bins[key]++;

if(!rWinBins[key]) rWinBins[key]={win:0,total:0};
rWinBins[key].total++;
if(d['勝敗']==='Win') rWinBins[key].win++;
});

const rLabels=Object.keys(bins);
const rCounts=Object.values(bins);

const rWinRate=rLabels.map(k=>{
const b=rWinBins[k];
return b ? (b.win/b.total)*100 : 0;
});

// ===== 時間帯×期待値 =====
let timeMap={};
data.forEach(d=>{
const h=Math.floor(d['エントリー時_日本']);
if(!timeMap[h]) timeMap[h]=[];
timeMap[h].push(d['損益_pips']);
});
const timeLabels=Object.keys(timeMap);
const timeExp=timeLabels.map(h=>{
const arr=timeMap[h];
return arr.reduce((a,b)=>a+b,0)/arr.length;
});

// ===== 曜日期待値 =====
const days=['Mon','Tue','Wed','Thu','Fri'];
const dayExp=days.map(day=>{
const arr=data.filter(d=>d['曜日']===day);
return arr.length?arr.reduce((a,b)=>a+b['損益_pips'],0)/arr.length:0;
});

// ===== 連敗シミュレーション =====
let loseDist={};
for(let i=0;i<500;i++){
let shuffled=[...data].sort(()=>Math.random()-0.5);
let streak=0,max=0;
shuffled.forEach(d=>{
if(d['勝敗']==='Loss'){streak++;max=Math.max(max,streak);}else streak=0;
});
loseDist[max]=(loseDist[max]||0)+1;
}
const loseLabels=Object.keys(loseDist);
const loseCounts=Object.values(loseDist);

// ===== ヒートマップ =====
let map={};
data.forEach(d=>{
const key=d['銘柄']+'_'+Math.floor(d['エントリー時_日本']);
if(!map[key]) map[key]=[];
map[key].push(d['損益_pips']);
});
let html='<table><tr><th>Pair/Hour</th>';
for(let h=0;h<24;h++) html+=`<th>${h}</th>`;
html+='</tr>';

const pairs=[...new Set(data.map(d=>d['銘柄']))];

pairs.forEach(p=>{
html+=`<tr><td>${p}</td>`;
for(let h=0;h<24;h++){
const arr=map[p+'_'+h]||[];
const val=arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):'';
html+=`<td>${val}</td>`;
}
html+='</tr>';
});
html+='</table>';
document.getElementById('heatmap').innerHTML=html;

// ===== UI =====
expectancy.innerText=expectancy.toFixed(2);
winRate.innerText=(winRate*100).toFixed(1)+'%';
rr.innerText=rr.toFixed(2);
pf.innerText=pf.toFixed(2);
maxDD.innerText=maxDD.toFixed(1);
maxLose.innerText=maxLose;
stdDev.innerText=stdDev.toFixed(2);
ddDuration.innerText=ddDur;

// ===== charts =====
new Chart(equity,{type:'line',data:{labels:curve.map((_,i)=>i),datasets:[{data:curve}]},
options:{plugins:{title:{display:true,text:'累積損益'}}}});

new Chart(timeExpChart,{type:'bar',data:{labels:timeLabels,datasets:[{data:timeExp}]},
options:{plugins:{title:{display:true,text:'時間帯別期待値'}}}});

new Chart(dayExpChart,{type:'bar',data:{labels:days,datasets:[{data:dayExp}]},
options:{plugins:{title:{display:true,text:'曜日別期待値'}}}});

new Chart(rHist,{type:'bar',data:{labels:rLabels,datasets:[{data:rCounts}]},
options:{plugins:{title:{display:true,text:'R倍数分布'}}}});

new Chart(rWin,{type:'line',data:{labels:rLabels,datasets:[{data:rWinRate}]},
options:{plugins:{title:{display:true,text:'R倍数 × 勝率'}}}});

new Chart(loseSim,{type:'bar',data:{labels:loseLabels,datasets:[{data:loseCounts}]},
options:{plugins:{title:{display:true,text:'連敗シミュレーション'}}}});

// ===== table =====
table.innerHTML='<tr>'+Object.keys(data[0]).map(k=>`<th>${k}</th>`).join('')+'</tr>'+
data.map(d=>'<tr>'+Object.values(d).map(v=>`<td>${v}</td>`).join('')+'</tr>').join('');

}

</script>

</body>
</html>
