<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO ANALYZER + MonteCarlo</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.chart-container { height:260px; }
</style>
</head>

<body class="bg-slate-50 text-slate-900">

<div class="max-w-7xl mx-auto p-6">

<h1 class="text-3xl font-black mb-6">PRO ANALYZER</h1>

<input type="file" id="file">

<!-- KPI -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 my-6">

<div class="bg-white p-4">期待値 <div id="expectancy"></div></div>
<div class="bg-white p-4">勝率 <div id="winRate"></div></div>
<div class="bg-white p-4">RR <div id="rr"></div></div>
<div class="bg-white p-4">PF <div id="pf"></div></div>

<div class="bg-white p-4">最大DD <div id="maxDD"></div></div>
<div class="bg-white p-4">最大連敗 <div id="maxLose"></div></div>
<div class="bg-white p-4">平均R <div id="avgR"></div></div>
<div class="bg-white p-4">理論破産確率 <div id="ruin"></div></div>

<div class="bg-white p-4">MC破産確率 <div id="mcRuin"></div></div>
<div class="bg-white p-4">MC平均DD <div id="mcDD"></div></div>
<div class="bg-white p-4">MC最悪DD <div id="mcWorst"></div></div>

</div>

<!-- charts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div class="bg-white p-4"><canvas id="equity"></canvas></div>
<div class="bg-white p-4"><canvas id="time"></canvas></div>
<div class="bg-white p-4"><canvas id="day"></canvas></div>
<div class="bg-white p-4"><canvas id="risk"></canvas></div>
<div class="bg-white p-4"><canvas id="rDist"></canvas></div>
<div class="bg-white p-4"><canvas id="ddDist"></canvas></div>

</div>

</div>

<script>

let data = [];

document.getElementById('file').onchange = e => {
Papa.parse(e.target.files[0], {
header:true,
dynamicTyping:true,
complete: res => {
data = res.data;
analyze();
}
});
};

function analyze(){

data.sort((a,b)=> new Date(a['決済日時_日本']) - new Date(b['決済日時_日本']));

const wins = data.filter(d=>d['勝敗']==='Win');
const losses = data.filter(d=>d['勝敗']==='Loss');

const count = data.length;

const winRate = wins.length / count;

const avgWin = wins.length ? wins.reduce((a,b)=>a+b['損益_pips'],0)/wins.length : 0;
const avgLoss = losses.length ? Math.abs(losses.reduce((a,b)=>a+b['損益_pips'],0)/losses.length) : 1;

const rr = avgWin/avgLoss;

const expectancy = winRate*avgWin - (1-winRate)*avgLoss;

const totalProfit = wins.reduce((a,b)=>a+(b['損益_純額']||0),0);
const totalLoss = Math.abs(losses.reduce((a,b)=>a+(b['損益_純額']||0),0)) || 1;

const pf = totalProfit / totalLoss;

// ===== DD =====
let equity = 0;
let peak = 0;
let maxDD = 0;
let curve = [];

data.forEach(d=>{
equity += d['損益_pips']||0;
peak = Math.max(peak, equity);
let dd = peak - equity;
maxDD = Math.max(maxDD, dd);
curve.push(equity);
});

// ===== 連敗 =====
let loseStreak = 0;
let maxLose = 0;

data.forEach(d=>{
if(d['勝敗']==='Loss'){
loseStreak++;
maxLose = Math.max(maxLose, loseStreak);
}else{
loseStreak = 0;
}
});

// ===== R =====
const rValues = data.map(d=>{
const risk = d['リスク率_%'] || 1;
return (d['損益_pips']||0)/risk;
});
const avgR = rValues.reduce((a,b)=>a+b,0)/count;

// ===== 理論破産 =====
const ruin = calcRuin(winRate, rr, 0.01);

// ===== モンテカルロ =====
const mc = monteCarlo(data, 1000);

// ===== UI =====
document.getElementById('expectancy').innerText = expectancy.toFixed(2);
document.getElementById('winRate').innerText = (winRate*100).toFixed(1)+'%';
document.getElementById('rr').innerText = rr.toFixed(2);
document.getElementById('pf').innerText = pf.toFixed(2);
document.getElementById('maxDD').innerText = maxDD.toFixed(1);
document.getElementById('maxLose').innerText = maxLose;
document.getElementById('avgR').innerText = avgR.toFixed(2);
document.getElementById('ruin').innerText = ruin.toFixed(2)+'%';

document.getElementById('mcRuin').innerText = mc.ruin.toFixed(2)+'%';
document.getElementById('mcDD').innerText = mc.avgDD.toFixed(1);
document.getElementById('mcWorst').innerText = mc.worstDD.toFixed(1);

// ===== charts =====

new Chart(document.getElementById('equity'),{
type:'line',
data:{labels:data.map((_,i)=>i),datasets:[{data:curve}]}
});

new Chart(document.getElementById('time'),{
type:'scatter',
data:{datasets:[{data:data.map(d=>({x:d['エントリー時_日本'],y:d['損益_pips']}))}]}
});

const days=['Mon','Tue','Wed','Thu','Fri'];
const dayData = days.map(day=>{
const t=data.filter(d=>d['曜日']===day);
return t.length ? t.filter(d=>d['勝敗']==='Win').length/t.length*100 : 0;
});
new Chart(document.getElementById('day'),{
type:'bar',
data:{labels:days,datasets:[{data:dayData}]}
});

new Chart(document.getElementById('risk'),{
type:'scatter',
data:{datasets:[{data:data.map(d=>({x:d['リスク率_%'],y:d['損益_pips']}))}]}
});

new Chart(document.getElementById('rDist'),{
type:'bar',
data:{labels:rValues.map((_,i)=>i),datasets:[{data:rValues}]}
});

// DD分布
new Chart(document.getElementById('ddDist'),{
type:'bar',
data:{
labels:mc.ddList.map((_,i)=>i),
datasets:[{data:mc.ddList}]
}
});

}

// ===== モンテカルロ =====
function monteCarlo(data, n){

let ruinCount = 0;
let ddList = [];

for(let i=0;i<n;i++){

let shuffled = shuffle([...data]);

let equity = 0;
let peak = 0;
let maxDD = 0;

shuffled.forEach(d=>{
equity += d['損益_pips']||0;
peak = Math.max(peak,equity);
maxDD = Math.max(maxDD, peak-equity);
});

ddList.push(maxDD);

if(equity < -1000) ruinCount++; // 適当な破産ライン
}

const avgDD = ddList.reduce((a,b)=>a+b,0)/n;
const worstDD = Math.max(...ddList);

return {
ruin:(ruinCount/n)*100,
avgDD,
worstDD,
ddList
};
}

// シャッフル
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// 理論破産
function calcRuin(P,R,r){
if(P*(1+R)<=1) return 100;
const edge = P*R - (1-P);
if(edge<=0) return 100;
const units = 1/r;
return Math.pow((1-edge)/(1+edge),units)*100;
}

</script>

</body>
</html>
